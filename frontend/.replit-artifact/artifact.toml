kind = "mobile"
previewPath = "/"
title = "Rwanda Pay"
version = "1.0.0"
id = "artifacts/rwanda-pay"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20371

[services.development]
run = "pnpm --filter @workspace/rwanda-pay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rwanda-pay", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/rwanda-pay", "run", "serve" ]

[services.env]
PORT = "20371"
BASE_PATH = "/"

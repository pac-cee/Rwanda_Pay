version: "3.9"

# ── Rwanda Pay — Docker Compose ───────────────────────────────────────────────
# Usage:
#   docker-compose up --build          # start all services
#   docker-compose up --build -d       # start in background
#   docker-compose down                # stop all services
#   docker-compose down -v             # stop and wipe database volume
#   docker-compose logs -f api         # tail API logs
#   docker-compose logs -f db          # tail DB logs

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: rwanda_pay_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rwandapay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rwandapay_secret}
      POSTGRES_DB: ${POSTGRES_DB:-rwanda_pay}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run init.sql on first start to create schema + seed merchants
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rwandapay} -d ${POSTGRES_DB:-rwanda_pay}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go/Fiber API Server ───────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rwanda_pay_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-rwanda_pay}
      DB_USER: ${POSTGRES_USER:-rwandapay}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-rwandapay_secret}
      DB_SSLMODE: disable
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      JWT_SECRET: ${JWT_SECRET:-rwanda-pay-jwt-secret-change-in-production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-168}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-6368616e676520746869732070617373776f726420746f206120736563726574}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
